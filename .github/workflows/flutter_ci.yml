name: Flutter CI

on:
  push:
    branches: ["main", "son"]
  pull_request:
    branches: ["main"]

jobs:
  analyze-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
