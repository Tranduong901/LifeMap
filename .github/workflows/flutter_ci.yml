name: Flutter CI

on:
  push:
    branches: ["main", "son"]
  pull_request:
    branches: ["main"]

jobs:
  analyze-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug: show commit and profile snippet
        run: |
          echo "Commit: $(git rev-parse --short HEAD)"
          echo "Files changed in HEAD:"
          git --no-pager show --name-only --pretty="" HEAD | sed -n '1,40p' || true
          echo "--- head of lib/views/profile/profile_view.dart ---"
          sed -n '1,120p' lib/views/profile/profile_view.dart || true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
